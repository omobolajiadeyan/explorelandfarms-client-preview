<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1900 260" role="img" aria-label="Exploreland Farms">
  <title>Exploreland Farms</title>
  <defs>
    <path id="leaf" d="M140,240 C100,196 96,112 140,40 C184,112 180,196 140,240 Z"/>
  </defs>

  <!-- three-leaf mark: symmetric petal, rotated around a shared base point so it stays balanced -->
  <use href="#leaf" fill="#1b5e20" transform="rotate(-6 140 240) translate(0 6) scale(0.86)" transform-origin="140 240"/>
  <use href="#leaf" fill="#2e7d32" transform="rotate(32 140 240)"/>
  <use href="#leaf" fill="#8dc63f" transform="rotate(-34 140 240)"/>

  <text x="300" y="178" font-family="Manrope, 'Segoe UI', Arial, sans-serif" font-weight="800"
        font-size="140" letter-spacing="-2" fill="#1b5e20">Exploreland <tspan fill="#2e7d32">Farms</tspan></text>
</svg>
